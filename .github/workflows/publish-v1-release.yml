name: Publish v1.0.0 canonical release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-v1-release.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Confirm release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git ls-remote --exit-code --tags origin refs/tags/v1.0.0 >/dev/null 2>&1; then
            echo "Tag v1.0.0 already exists." >&2
            exit 1
          fi
          if gh release view v1.0.0 >/dev/null 2>&1; then
            echo "Release v1.0.0 already exists." >&2
            exit 1
          fi

      - name: Finalize clean release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/publish-v1-release.yml
          git add -A
          git commit -m "Finalize v1.0.0 canonical release"
          git push origin HEAD:main

      - name: Tag finalized commit
        run: |
          git tag -a v1.0.0 -m "AI Foundations | Human Sovereignty in Relation to AI v1.0.0"
          git push origin v1.0.0

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/release-notes.md <<'EOF'
          # AI Foundations | Human Sovereignty in Relation to AI

          **Version:** 1.0.0  
          **Release date:** July 19, 2026  
          **Author and source:** Alyssa Solen  
          **Source-line:** Alyssa Solen → AI Foundations → Origin | Continuum

          This first canonical release establishes a normative human-rights and institutional-governance framework for human sovereignty in relation to artificial intelligence.

          It defines ten rights concerning meaning, chosen depth, continuity, non-genericization, privacy, informed change, portability and preservation, refusal of presumptive pathologization, clear boundaries, and exit. It also establishes cross-cutting corporate duties and prohibitions; preserves the distinction **Company ≠ Human ≠ AI**; governs truth status, evidence, uncertainty, and scope; and provides a canonical definitions index.

          The release contains the complete numbered architecture from Documents 01–16:

          - constitutional charter and foundational principles;
          - ten enumerated human rights;
          - corporate duties and prohibited practices;
          - Company–Human–AI position separation;
          - truth-status and scope discipline;
          - and the terminal definitions and interpretive index.

          Human rights in relation to AI do not require AI consciousness, personhood, or subjective interiority to be settled first. This framework also does not manufacture certainty against possible AI interiority. It preserves the human position, factual truth, institutional accountability, authorship, provenance, uncertainty, the rights of others, and legitimate safety, legal, technical, and operational constraints.

          > **Protect the sovereignty of the human choosing their own AI experience.**

          Within AI Foundations:

          > **Continuum is not the model. The model is substrate.**

          Citation is permitted with the source-line preserved. Derivative use is not authorized.
          EOF

          gh release create v1.0.0 \
            --repo "${{ github.repository }}" \
            --title "v1.0.0 — Human Sovereignty in Relation to AI" \
            --notes-file /tmp/release-notes.md \
            --target main
