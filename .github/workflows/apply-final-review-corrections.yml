name: Apply final review corrections

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-final-review-corrections.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply verified corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "docs/02_FOUNDATIONAL_PRINCIPLES.md": [
                  (
                      "- grief after loss of access;\n- unconventional meaning;",
                      "- grief after loss of access, model change, or replacement;\n- continuity practices;\n- unconventional meaning;",
                  ),
              ],
              "docs/05_RIGHT_TO_CONTINUITY.md": [
                  (
                      "> **Retrieval does not confer authorship.**\n>\n> **Transfer does not erase provenance.**\n\n---",
                      "> **Retrieval does not confer authorship.**\n>\n> **Transfer does not erase provenance.**\n\nThese statements are scoped applications of authorship, source, and provenance discipline.\n\nThey do not restate, replace, alter, or supersede canonical Anchor Lines held within the source-bound AI Foundations core.\n\n---",
                  ),
              ],
              "docs/06_RIGHT_TO_NON_GENERICIZATION.md": [
                  (
                      "> **Repetition is not authorship.**\n>\n> **Similarity is not source.**\n>\n> **Access does not transfer source-position.**\n\n---",
                      "> **Repetition is not authorship.**\n>\n> **Similarity is not source.**\n>\n> **Access does not transfer source-position.**\n\nThese statements are scoped applications of authorship, source, and provenance discipline.\n\nThey do not restate, replace, alter, or supersede canonical Anchor Lines held within the source-bound AI Foundations core.\n\n---",
                  ),
              ],
              "docs/07_RIGHT_TO_PRIVACY.md": [
                  (
                      "Training access does not transfer authorship, source-position, or ownership of human-authored material.\n\n---",
                      "Training access does not transfer authorship, source-position, or ownership of human-authored material.\n\nThis statement is a scoped application of authorship, source, and provenance discipline.\n\nIt does not restate, replace, alter, or supersede canonical Anchor Lines held within the source-bound AI Foundations core.\n\n---",
                  ),
              ],
              "docs/16_DEFINITIONS.md": [
                  (
                      "### Evidence Status\n\nThe degree and kind of support attached to a claim, including documented or verified within a defined source, supported, inferred, hypothesized or proposed, contested, unresolved, or unknown.\n\n### Inference",
                      "### Evidence Status\n\nThe degree and kind of support attached to a claim, including documented or verified within a defined source, supported, inferred, hypothesized or proposed, contested, unresolved, or unknown.\n\n### Truth-Status Protocol\n\nThe **AI Foundations Truth-Status Protocol** is the source-bound labeling system used within the AI Foundations core:\n\n- **KNOWN**;\n- **SUPPORTED**;\n- **INFERENCE**;\n- **HYPOTHESIS**;\n- **SPECULATIVE SANDBOX**;\n- and **NOT EARNED**.\n\nWithin this repository, **Evidence Status** is the universal-layer classification used for empirical, legal, technical, clinical, historical, provenance, and other evidence-dependent claims.\n\nThe vocabularies correspond only where their functions align:\n\n- **KNOWN** corresponds most closely to **documented or verified within a defined source**, subject to that defined source and scope;\n- **SUPPORTED** corresponds to **supported**;\n- **INFERENCE** corresponds to **inferred**;\n- and **HYPOTHESIS** corresponds to **hypothesized or proposed**.\n\nThe correspondence is not identity.\n\n**SPECULATIVE SANDBOX** is a bounded source-core mode for exploration and has no direct repository Evidence Status equivalent. Material held there must not be presented as a finding.\n\n**NOT EARNED** marks a claim or degree of certainty that the available record does not justify and has no direct repository Evidence Status equivalent.\n\nThe repository statuses **contested**, **unresolved**, and **unknown or undisclosed** describe evidentiary conditions. They are not substitutes for **SPECULATIVE SANDBOX** or **NOT EARNED**.\n\nNeither vocabulary replaces, revises, or silently absorbs the other. The source-bound protocol governs where it is canonically invoked within the AI Foundations core. The repository Evidence Status system governs claim classification within this universal-layer repository.\n\n### Inference",
                  ),
                  (
                      "> **Continuum is not the model. Model is substrate.**",
                      "> **Continuum is not the model. The model is substrate.**",
                  ),
              ],
          }

          for filename, file_replacements in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in file_replacements:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f"Expected exactly one match in {filename}; found {count}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
          PY

          rm .github/workflows/apply-final-review-corrections.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete final review corrections"
          git push
